<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 笔记应用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>笔记</h1>
                <div class="sidebar-actions">
                    <button id="new-note-btn" class="btn btn-primary" title="新建笔记 (Ctrl+Shift+N)">新建笔记</button>
                    <button id="keyboard-shortcuts-btn" class="btn btn-secondary" title="键盘快捷键 (Ctrl+?)">
                        <span class="icon">?</span>
                    </button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="搜索笔记...">
            </div>
            <div class="notes-list" id="notes-list"></div>
            <div class="no-results" id="no-results" style="display: none;">
                <p>没有找到匹配的笔记</p>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 编辑区 -->
            <div class="editor-container">
                <div class="editor-header">
                    <h2>编辑</h2>
                </div>
                <div class="format-toolbar">
                    <button class="format-btn" data-action="bold" title="加粗 (Ctrl+B)">
                        <span class="icon">B</span>
                    </button>
                    <button class="format-btn" data-action="italic" title="斜体 (Ctrl+I)">
                        <span class="icon">I</span>
                    </button>
                    <button class="format-btn" data-action="inline-code" title="行内代码">
                        <span class="icon code-icon"><></span>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="format-btn" data-action="h1" title="标题 H1">
                        <span class="icon">H1</span>
                    </button>
                    <button class="format-btn" data-action="h2" title="标题 H2">
                        <span class="icon">H2</span>
                    </button>
                    <button class="format-btn" data-action="h3" title="标题 H3">
                        <span class="icon">H3</span>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="format-btn" data-action="ul" title="无序列表">
                        <span class="icon">•</span>
                    </button>
                    <button class="format-btn" data-action="ol" title="有序列表">
                        <span class="icon">1.</span>
                    </button>
                    <button class="format-btn" data-action="quote" title="引用">
                        <span class="icon">"</span>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="format-btn" id="export-btn" title="导出为 Markdown 文件">
                        <span class="icon">导出</span>
                    </button>
                    <button class="format-btn" id="theme-toggle-btn" title="切换主题 (深色/浅色)">
                        <span class="icon">🌙</span>
                    </button>
                </div>
                <textarea id="editor" placeholder="开始输入 Markdown 内容..."></textarea>
                <div class="editor-footer">
                    <span id="char-count" class="stat-item">字符数: 0</span>
                    <span id="word-count" class="stat-item">字数: 0</span>
                </div>
            </div>
            
            <!-- 预览区 -->
            <div class="preview-container">
                <div class="preview-header">
                    <h2>预览</h2>
                </div>
                <div id="preview" class="preview-content">
                    <!-- 预览内容将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    
    <!-- 自定义确认对话框 -->
    <div class="confirm-dialog-overlay" id="confirm-dialog-overlay">
        <div class="confirm-dialog">
            <div class="confirm-dialog-header">
                <h3 id="confirm-dialog-title">确认</h3>
            </div>
            <div class="confirm-dialog-content">
                <p id="confirm-dialog-message">确定要执行此操作吗？</p>
            </div>
            <div class="confirm-dialog-footer">
                <button id="confirm-dialog-cancel" class="btn btn-secondary">取消</button>
                <button id="confirm-dialog-confirm" class="btn btn-danger">确定</button>
            </div>
        </div>
    </div>
    
    <!-- 自定义提示对话框 -->
    <div class="alert-dialog-overlay" id="alert-dialog-overlay">
        <div class="alert-dialog">
            <div class="alert-dialog-header">
                <h3 id="alert-dialog-title">提示</h3>
            </div>
            <div class="alert-dialog-content">
                <p id="alert-dialog-message">这是一个提示信息。</p>
            </div>
            <div class="alert-dialog-footer">
                <button id="alert-dialog-ok" class="btn btn-primary">知道了</button>
            </div>
        </div>
    </div>
    
    <!-- 快捷键参考对话框 -->
    <div class="shortcuts-dialog-overlay" id="shortcuts-dialog-overlay">
        <div class="shortcuts-dialog">
            <div class="shortcuts-dialog-header">
                <h3 id="shortcuts-dialog-title">键盘快捷键</h3>
                <button id="shortcuts-dialog-close" class="dialog-close-btn" title="关闭">×</button>
            </div>
            <div class="shortcuts-dialog-content">
                <div class="shortcuts-section">
                    <h4>常用操作</h4>
                    <div class="shortcuts-list">
                        <div class="shortcut-item">
                            <span class="shortcut-key">Ctrl + Shift + N</span>
                            <span class="shortcut-desc">新建笔记</span>
                        </div>
                        <div class="shortcut-item">
                            <span class="shortcut-key">Ctrl + Shift + D</span>
                            <span class="shortcut-desc">删除当前笔记</span>
                        </div>
                        <div class="shortcut-item">
                            <span class="shortcut-key">Ctrl + Shift + ↑</span>
                            <span class="shortcut-desc">上一条笔记</span>
                        </div>
                        <div class="shortcut-item">
                            <span class="shortcut-key">Ctrl + Shift + ↓</span>
                            <span class="shortcut-desc">下一条笔记</span>
                        </div>
                        <div class="shortcut-item">
                            <span class="shortcut-key">Ctrl + ?</span>
                            <span class="shortcut-desc">显示/隐藏快捷键参考</span>
                        </div>
                        <div class="shortcut-item">
                            <span class="shortcut-key">Esc</span>
                            <span class="shortcut-desc">关闭对话框</span>
                        </div>
                    </div>
                </div>
                <div class="shortcuts-section">
                    <h4>文本格式</h4>
                    <div class="shortcuts-list">
                        <div class="shortcut-item">
                            <span class="shortcut-key">Ctrl + B</span>
                            <span class="shortcut-desc">加粗</span>
                        </div>
                        <div class="shortcut-item">
                            <span class="shortcut-key">Ctrl + I</span>
                            <span class="shortcut-desc">斜体</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
