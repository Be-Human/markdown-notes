<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 笔记应用</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>笔记</h1>
                <button id="new-note-btn" class="btn btn-primary">新建笔记</button>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="搜索笔记...">
            </div>
            <div class="notes-list" id="notes-list"></div>
            <div class="no-results" id="no-results" style="display: none;">
                <p>没有找到匹配的笔记</p>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 编辑区 -->
            <div class="editor-container">
                <div class="editor-header">
                    <h2>编辑</h2>
                </div>
                <div class="format-toolbar">
                    <button class="format-btn" data-action="bold" title="加粗 (Ctrl+B)">
                        <span class="icon">B</span>
                    </button>
                    <button class="format-btn" data-action="italic" title="斜体 (Ctrl+I)">
                        <span class="icon">I</span>
                    </button>
                    <button class="format-btn" data-action="inline-code" title="行内代码">
                        <span class="icon code-icon"><></span>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="format-btn" data-action="h1" title="标题 H1">
                        <span class="icon">H1</span>
                    </button>
                    <button class="format-btn" data-action="h2" title="标题 H2">
                        <span class="icon">H2</span>
                    </button>
                    <button class="format-btn" data-action="h3" title="标题 H3">
                        <span class="icon">H3</span>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="format-btn" data-action="ul" title="无序列表">
                        <span class="icon">•</span>
                    </button>
                    <button class="format-btn" data-action="ol" title="有序列表">
                        <span class="icon">1.</span>
                    </button>
                    <button class="format-btn" data-action="quote" title="引用">
                        <span class="icon">"</span>
                    </button>
                </div>
                <textarea id="editor" placeholder="开始输入 Markdown 内容..."></textarea>
            </div>
            
            <!-- 预览区 -->
            <div class="preview-container">
                <div class="preview-header">
                    <h2>预览</h2>
                </div>
                <div id="preview" class="preview-content">
                    <!-- 预览内容将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    
    <!-- 自定义确认对话框 -->
    <div class="confirm-dialog-overlay" id="confirm-dialog-overlay">
        <div class="confirm-dialog">
            <div class="confirm-dialog-header">
                <h3 id="confirm-dialog-title">确认</h3>
            </div>
            <div class="confirm-dialog-content">
                <p id="confirm-dialog-message">确定要执行此操作吗？</p>
            </div>
            <div class="confirm-dialog-footer">
                <button id="confirm-dialog-cancel" class="btn btn-secondary">取消</button>
                <button id="confirm-dialog-confirm" class="btn btn-danger">确定</button>
            </div>
        </div>
    </div>
    
    <!-- 自定义提示对话框 -->
    <div class="alert-dialog-overlay" id="alert-dialog-overlay">
        <div class="alert-dialog">
            <div class="alert-dialog-header">
                <h3 id="alert-dialog-title">提示</h3>
            </div>
            <div class="alert-dialog-content">
                <p id="alert-dialog-message">这是一个提示信息。</p>
            </div>
            <div class="alert-dialog-footer">
                <button id="alert-dialog-ok" class="btn btn-primary">知道了</button>
            </div>
        </div>
    </div>
</body>
</html>
